name: Build and Push Docker Images to ECR

on:
  push:
    branches:
      - production
      - Production
    paths:
      - '**'
      - '.github/workflows/build-and-push-ecr.yml'
  pull_request:
    branches:
      - production
      - Production
    types:
      - closed
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    strategy:
      matrix:
        include:
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            repository: cricket-club-frontend
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            repository: cricket-clun-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image variables
        id: vars
        run: |
          echo "IMAGE_TAG=${{ matrix.service }}-build-${{ github.run_number }}-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service }} image
        run: |
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t ${{ steps.vars.outputs.REGISTRY }}/${{ matrix.repository }}:${{ steps.vars.outputs.IMAGE_TAG }} \
            -t ${{ steps.vars.outputs.REGISTRY }}/${{ matrix.repository }}:${{ matrix.service }}-latest \
            ${{ matrix.context }}
          docker push ${{ steps.vars.outputs.REGISTRY }}/${{ matrix.repository }}:${{ steps.vars.outputs.IMAGE_TAG }}
          docker push ${{ steps.vars.outputs.REGISTRY }}/${{ matrix.repository }}:${{ matrix.service }}-latest

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy frontend and backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          envs: AWS_REGION,REGISTRY,FRONTEND_IMAGE,BACKEND_IMAGE,FRONTEND_TAG,BACKEND_TAG
          script: |
            set -e

            deploy_container() {
              local container_name="$1"
              local image_ref="$2"
              local host_port="$3"
              local container_port="$4"
              local extra_args="$5"

              if sudo docker container inspect "$container_name" >/dev/null 2>&1; then
                echo "Updating existing container: $container_name"
                sudo docker rm -f "$container_name"
              else
                echo "Creating new container: $container_name"
              fi

              sudo docker run -d \
                --name "$container_name" \
                --restart unless-stopped \
                -p "$host_port:$container_port" \
                $extra_args \
                "$image_ref"
            }

            sudo apt-get update -y
            if ! command -v aws >/dev/null 2>&1; then
              sudo apt-get install -y awscli
            fi

            aws ecr get-login-password --region "$AWS_REGION" | sudo docker login --username AWS --password-stdin "$REGISTRY"

            sudo docker pull "$FRONTEND_IMAGE:$FRONTEND_TAG"
            sudo docker pull "$BACKEND_IMAGE:$BACKEND_TAG"

            deploy_container \
              cricket-backend \
              "$BACKEND_IMAGE:$BACKEND_TAG" \
              5000 \
              5000 \
              "--env-file /opt/cricket-club/backend.env"

            deploy_container \
              cricket-frontend \
              "$FRONTEND_IMAGE:$FRONTEND_TAG" \
              3000 \
              3000 \
              ""
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          FRONTEND_IMAGE: ${{ steps.login-ecr.outputs.registry }}/cricket-club-frontend
          BACKEND_IMAGE: ${{ steps.login-ecr.outputs.registry }}/cricket-clun-backend
          FRONTEND_TAG: frontend-build-${{ github.run_number }}-${{ github.sha }}
          BACKEND_TAG: backend-build-${{ github.run_number }}-${{ github.sha }}
