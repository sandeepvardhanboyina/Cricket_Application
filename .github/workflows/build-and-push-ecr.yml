name: Build and Push Docker Images to ECR

on:
  push:
    branches:
      - production
      - Production
    paths:
      - '**'
      - '.github/workflows/build-and-push-ecr.yml'
  pull_request:
    branches:
      - production
      - Production
    types:
      - closed
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    strategy:
      matrix:
        include:
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            repository: cricket-club-frontend
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            repository: cricket-clun-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image variables
        id: vars
        run: |
          echo "IMAGE_TAG=${{ matrix.service }}-build-${{ github.run_number }}-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service }} image
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            docker build \
              --build-arg "NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_HOST }}:5000/api" \
              --build-arg "NEXT_PUBLIC_SITE_URL=http://${{ secrets.EC2_HOST }}:3000" \
              --build-arg "NEXT_PUBLIC_SITE_NAME=Cricket Tournament Hub" \
              -f ${{ matrix.dockerfile }} \
              -t ${{ steps.vars.outputs.REGISTRY }}/${{ matrix.repository }}:${{ steps.vars.outputs.IMAGE_TAG }} \
              -t ${{ steps.vars.outputs.REGISTRY }}/${{ matrix.repository }}:${{ matrix.service }}-latest \
              ${{ matrix.context }}
          else
            docker build \
              -f ${{ matrix.dockerfile }} \
              -t ${{ steps.vars.outputs.REGISTRY }}/${{ matrix.repository }}:${{ steps.vars.outputs.IMAGE_TAG }} \
              -t ${{ steps.vars.outputs.REGISTRY }}/${{ matrix.repository }}:${{ matrix.service }}-latest \
              ${{ matrix.context }}
          fi
          docker push ${{ steps.vars.outputs.REGISTRY }}/${{ matrix.repository }}:${{ steps.vars.outputs.IMAGE_TAG }}
          docker push ${{ steps.vars.outputs.REGISTRY }}/${{ matrix.repository }}:${{ matrix.service }}-latest

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy frontend and backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          envs: AWS_REGION,REGISTRY,FRONTEND_IMAGE,BACKEND_IMAGE,FRONTEND_TAG,BACKEND_TAG,MONGODB_URI,JWT_SECRET,JWT_EXPIRE,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,EMAIL_FROM,FRONTEND_URL,API_URL,AUTO_APPROVE_TEAMS
          script: |
            set -e

            ensure_network() {
              if ! sudo docker network inspect cricket-club-net >/dev/null 2>&1; then
                sudo docker network create cricket-club-net
              fi
            }

            ensure_mongo() {
              if sudo docker container inspect cricket-mongo >/dev/null 2>&1; then
                echo "Mongo container exists, starting if stopped"
                sudo docker start cricket-mongo >/dev/null 2>&1 || true
              else
                echo "Creating Mongo container"
                sudo docker run -d \
                  --name cricket-mongo \
                  --restart unless-stopped \
                  --network cricket-club-net \
                  -v cricket_mongo_data:/data/db \
                  mongo:7
              fi

              until sudo docker exec cricket-mongo mongosh --quiet --eval "db.adminCommand('ping')" >/dev/null 2>&1; do
                sleep 2
              done
            }

            write_backend_env() {
              sudo mkdir -p /opt/cricket-club
              printf '%s\n' \
                "NODE_ENV=production" \
                "PORT=5000" \
                "MONGODB_URI=${MONGODB_URI}" \
                "JWT_SECRET=${JWT_SECRET}" \
                "JWT_EXPIRE=${JWT_EXPIRE}" \
                "CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}" \
                "CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}" \
                "CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}" \
                "SMTP_HOST=${SMTP_HOST}" \
                "SMTP_PORT=${SMTP_PORT}" \
                "SMTP_USER=${SMTP_USER}" \
                "SMTP_PASS=${SMTP_PASS}" \
                "EMAIL_FROM=${EMAIL_FROM}" \
                "FRONTEND_URL=${FRONTEND_URL}" \
                "API_URL=${API_URL}" \
                "AUTO_APPROVE_TEAMS=${AUTO_APPROVE_TEAMS}" | sudo tee /opt/cricket-club/backend.env >/dev/null
            }

            deploy_backend() {
              if sudo docker container inspect cricket-backend >/dev/null 2>&1; then
                echo "Updating existing container: cricket-backend"
                sudo docker rm -f cricket-backend
              else
                echo "Creating new container: cricket-backend"
              fi

              sudo docker run -d \
                --name cricket-backend \
                --restart unless-stopped \
                --network cricket-club-net \
                -p 5000:5000 \
                --env-file /opt/cricket-club/backend.env \
                "$BACKEND_IMAGE:$BACKEND_TAG"
            }

            deploy_frontend() {
              if sudo docker container inspect cricket-frontend >/dev/null 2>&1; then
                echo "Updating existing container: cricket-frontend"
                sudo docker rm -f cricket-frontend
              else
                echo "Creating new container: cricket-frontend"
              fi

              sudo docker run -d \
                --name cricket-frontend \
                --restart unless-stopped \
                --network cricket-club-net \
                -p 3000:3000 \
                "$FRONTEND_IMAGE:$FRONTEND_TAG"
            }

            sudo apt-get update -y
            if ! command -v aws >/dev/null 2>&1; then
              sudo apt-get install -y awscli
            fi

            aws ecr get-login-password --region "$AWS_REGION" | sudo docker login --username AWS --password-stdin "$REGISTRY"

            sudo docker pull "$FRONTEND_IMAGE:$FRONTEND_TAG"
            sudo docker pull "$BACKEND_IMAGE:$BACKEND_TAG"

            ensure_network
            ensure_mongo
            write_backend_env
            deploy_backend
            deploy_frontend
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          FRONTEND_IMAGE: ${{ steps.login-ecr.outputs.registry }}/cricket-club-frontend
          BACKEND_IMAGE: ${{ steps.login-ecr.outputs.registry }}/cricket-clun-backend
          FRONTEND_TAG: frontend-build-${{ github.run_number }}-${{ github.sha }}
          BACKEND_TAG: backend-build-${{ github.run_number }}-${{ github.sha }}
          MONGODB_URI: mongodb://cricket-mongo:27017/cricket-tournament-hub
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRE: ${{ secrets.JWT_EXPIRE }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          FRONTEND_URL: "http://${{ secrets.EC2_HOST }}:3000"
          API_URL: "http://${{ secrets.EC2_HOST }}:5000"
          AUTO_APPROVE_TEAMS: ${{ secrets.AUTO_APPROVE_TEAMS }}
