name: Build and Push Docker Images to ECR

on:
  push:
    branches:
      - production
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: cricket-club

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - frontend
          - backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image variables
        id: vars
        run: |
          echo "IMAGE_TAG=${{ matrix.service }}-build-${{ github.run_number }}-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service }} image
        run: |
          docker build \
            -f ./${{ matrix.service }}/Dockerfile \
            -t ${{ steps.vars.outputs.REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.IMAGE_TAG }} \
            -t ${{ steps.vars.outputs.REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.service }}-latest \
            ./${{ matrix.service }}
          docker push ${{ steps.vars.outputs.REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.IMAGE_TAG }}
          docker push ${{ steps.vars.outputs.REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.service }}-latest
